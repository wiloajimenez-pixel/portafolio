<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cajas de Color</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        .cUno {
            height: 350px;
            background-color: #000000;
        }

        .cDos {
            height: 400px;
            background-color: rgb(47, 45, 51);
        }

        .cTres {
            height: 400px;
            background-color: rgb(47, 45, 51);
        }

        .cCuatro {
            height: 600px;
            background-color: rgb(47, 45, 51);
        }

        .cCinco {
            height: 700px;
            background-color: rgb(47, 45, 51);
        }

        .cSeis {
            height: 600px;
            background-color: rgb(47, 45, 51);
        }

        .cSiete {
            height: 600px;
            background-color: rgb(47, 45, 51);
        }

        .cOcho {
            height: 600px;
            background-color: rgb(47, 45, 51);
        }

        .cNueve {
            height: 600px;
            background-color: rgb(58, 41, 119);
        }

        .cDiez {
            height: 200px;
            background-color: rgb(112, 61, 160);
        }

       

        .masonry-container {
            column-count: 3;
            column-gap: 15px;
            width: 100%;
            padding: 20px;
        }

        @media (max-width: 992px) {
            .masonry-container {
                column-count: 2;
            }
        }

        @media (max-width: 576px) {
            .masonry-container {
                column-count: 1;
            }
        }

        .masonry-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .masonry-item:nth-child(2n) {
            animation-delay: 1s;
        }

        .masonry-item:nth-child(3n) {
            animation-delay: 2s;
        }

        .masonry-item:nth-child(4n) {
            animation-delay: 3s;
        }

        .masonry-item:hover {
            transform: scale(1.05) rotate(1deg) translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            animation-play-state: paused;
            z-index: 10;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .cSeis,
        .cSiete {
            min-height: 600px;
            height: auto !important;
            background-color: rgb(47, 45, 51);
        }

        @keyframes fadeInScaleUp {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(50px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animated-text-cTres {
            animation: fadeInScaleUp 2.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
            /* Empieza invisible antes de la animación */
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-100vw);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animated-text-cCinco {
            animation: slideInLeft 2.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(100vw);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animated-text-cOcho {
            animation: slideInRight 2.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div
                class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12 cUno d-flex justify-content-center align-items-center">
                <img src="portafoliotitulo.png" alt="Portafolio Título"
                    style="width: 50%; height: auto; object-fit: cover;">
            </div>
            <div
                class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-6 col-6 cDos d-flex justify-content-center align-items-center">
                <img src="cariperfilwilo_preview_rev_1.png" alt="Perfil Wilo"
                    style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <div
                class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-6 col-6 cTres d-flex justify-content-center align-items-center">
                <h2 class="text-white text-center m-0 animated-text-cTres"
                    style="font-family: 'Pirata One', system-ui; font-size: clamp(2rem, 4.5vw, 6rem); letter-spacing: 2px;">
                    WILSON ANDRES<br>JIMENEZ TEJERO
                </h2>
            </div>
            <div
                class="col-xxl-12 col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12 cCuatro d-flex justify-content-center align-items-center">
                <h2 class="text-white text-center m-0"
                    style="font-family: 'Pirata One', system-ui; font-size: clamp(2rem, 3.5vw, 4rem); letter-spacing: 2px;">
                    QUIEN SOY<br>Tecnologo de Desarrollo de Medios Graficos Visuales del SENA con conocimiento en diseño
                    gráfico,<br> programación web, illustrator y Photoshop</style>
                </h2>
            </div>
            <div
                class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-6 col-6 cCinco d-flex justify-content-center align-items-center">
                <h2 class="text-white text-center m-0 animated-text-cCinco"
                    style="font-family: 'Pirata One', system-ui; font-size: clamp(2rem, 3.5vw, 4rem); letter-spacing: 40px;">
                    MOCKUPS
                </h2>
            </div>
            <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-6 col-6 cSeis">
                <div class="masonry-container">
                    <div class="masonry-item">
                        <img src="accesorios.png" alt="Accesorios">
                    </div>
                    <div class="masonry-item">
                        <img src="aviso.png" alt="Aviso">
                    </div>
                    <div class="masonry-item">
                        <img src="nose.jpeg" alt="Nose">
                    </div>
                    <div class="masonry-item">
                        <img src="papas.jpeg" alt="Papas">
                    </div>
                    <div class="masonry-item">
                        <img src="redondo.png" alt="Redondo">
                    </div>
                </div>
            </div>
            <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-6 col-6 cSiete">
                <div class="masonry-container">
                    <div class="masonry-item">
                        <img src="logocafe.jpg" alt="Logo Cafe">
                    </div>
                    <div class="masonry-item">
                        <img src="logonose.jpg" alt="Logo Nose">
                    </div>
                    <div class="masonry-item">
                        <img src="logouva.jpg" alt="Logo Uva">
                    </div>
                    <div class="masonry-item">
                        <img src="logowilo.jpg" alt="Logo Wilo">
                    </div>
                </div>
            </div>
            <div
                class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-sm-6 col-6 cOcho d-flex justify-content-center align-items-center">
                <h2 class="text-white text-center m-0 animated-text-cOcho"
                    style="font-family: 'Pirata One', system-ui; font-size: clamp(2rem, 3.5vw, 4rem); letter-spacing: 40px;">
                    LOGOS
                </h2>
            </div>
           
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

</body>
